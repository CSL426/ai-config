name: Python CLI

on:
  push:
    paths:
      - "ai_config/**"
      - "tests/**"
      - "pyproject.toml"
      - "install.sh"
      - "install.ps1"
      - ".github/workflows/python-cli.yml"
  pull_request:
    paths:
      - "ai_config/**"
      - "tests/**"
      - "pyproject.toml"
      - "install.sh"
      - "install.ps1"
      - ".github/workflows/python-cli.yml"
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install pytest PyYAML ruff

      - name: Run tests
        run: python -m pytest tests/

      - name: Run static checks
        run: ruff check ai_config tests

      - name: Check installer syntax
        if: runner.os == 'Linux'
        run: bash -n install.sh
