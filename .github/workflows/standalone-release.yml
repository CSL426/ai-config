name: Standalone Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "ai_config/**"
      - "scripts/standalone_entry.py"
      - "tests/**"
      - "pyproject.toml"
      - "install.sh"
      - "install.ps1"
      - ".github/workflows/standalone-release.yml"
  pull_request:
    paths:
      - "ai_config/**"
      - "scripts/standalone_entry.py"
      - "tests/**"
      - "pyproject.toml"
      - "install.sh"
      - "install.ps1"
      - ".github/workflows/standalone-release.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"

jobs:
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest PyYAML ruff

      - name: Run tests
        run: python -m pytest tests/

      - name: Run static checks
        run: ruff check ai_config tests scripts/standalone_entry.py

      - name: Check installer syntax
        if: runner.os == 'Linux'
        run: bash -n install.sh

  build:
    name: ${{ matrix.asset }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            source: dist/ai-config
            asset: ai-config-linux-x86_64
          - os: windows-latest
            source: dist/ai-config.exe
            asset: ai-config-windows-x86_64.exe
          - os: macos-15-intel
            source: dist/ai-config
            asset: ai-config-macos-x86_64
          - os: macos-14
            source: dist/ai-config
            asset: ai-config-macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller==6.21.0 .

      - name: Build standalone executable
        run: >-
          python -m PyInstaller --clean --noconfirm --onefile
          --name ai-config --hidden-import ai_config.__main__
          scripts/standalone_entry.py

      - name: Name asset and write checksum
        env:
          SOURCE: ${{ matrix.source }}
          ASSET: ${{ matrix.asset }}
        shell: python
        run: |
          import hashlib
          import os
          from pathlib import Path

          source = Path(os.environ["SOURCE"])
          asset = source.with_name(os.environ["ASSET"])
          source.replace(asset)
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          asset.with_name(f"{asset.name}.sha256").write_text(
              f"{digest}  {asset.name}\n",
              encoding="utf-8",
          )

      - name: Verify standalone help
        env:
          ASSET: ${{ matrix.asset }}
        shell: python
        run: |
          import os
          import subprocess
          from pathlib import Path

          executable = Path("dist") / os.environ["ASSET"]
          result = subprocess.run(
              [str(executable.resolve()), "help"],
              capture_output=True,
              text=True,
          )
          print(result.stdout)
          raise SystemExit(result.returncode)

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes
